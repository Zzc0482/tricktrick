<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枝之杂记</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">✦ 枝</a>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于枝</a></li>
                <li><a href="#blog">文字</a></li>
                <li><a href="#skills">角落</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="greeting">内有恶犬生人勿进</span>
                <span class="name">枝</span>
            </h1>
            <p class="hero-subtitle">秘密基地</p>
            <p class="hero-desc">这里存放着一只同人女的文字。</p>
            <div class="hero-buttons">
                <a href="#blog" class="btn btn-primary">阅读文字</a>
                <a href="#contact" class="btn btn-outline">写信给我</a>
            </div>
        </div>
    </section>

    <!-- 关于我 -->
    <section class="about section" id="about">
        <div class="container">
            <h2 class="section-title">关于我</h2>
            <div class="about-grid">
                <div class="about-text">
                    <p>我是枝。</p>
                    <p>这里只有产品同人！</p>
                    <p class="signature">红白网站指路tricktrick</p>
                </div>
                <div class="about-avatar">
                    <div class="avatar-placeholder">
                        <svg viewBox="0 0 120 120" fill="none">
                            <circle cx="60" cy="45" r="20" fill="#8b5cf6" opacity="0.3"/>
                            <ellipse cx="60" cy="95" rx="35" ry="25" fill="#8b5cf6" opacity="0.3"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 文字/日记卡片 -->
    <section class="blog section" id="blog">
        <div class="container">
            <h2 class="section-title">近日文字</h2>
            <div class="blog-grid" id="blogGrid">
                <!-- 由 JS 动态生成 -->
            </div>
        </div>
    </section>

    <!-- 日记详情弹窗 -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-container">
            <button class="detail-close" id="detailClose">✕</button>
            <div class="detail-content" id="detailContent">
                <!-- 由 JS 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 心灵角落 -->
    <section class="skills section" id="skills">
        <div class="container">
            <h2 class="section-title">心灵角落</h2>
            <div class="skills-grid">
                <div class="skill-card" data-id="skill-1">
                    <div class="skill-icon">📖</div>
                    <h3>阅读</h3>
                    <p>文学 · 诗歌 · 散文</p>
                </div>
                <div class="skill-card" data-id="skill-2">
                    <div class="skill-icon">🖋️</div>
                    <h3>写作</h3>
                    <p>日记 · 随笔 · 片段</p>
                </div>
                <div class="skill-card" data-id="skill-3">
                    <div class="skill-icon">☕</div>
                    <h3>日常</h3>
                    <p>手冲 · 窗边 · 发呆</p>
                </div>
                <div class="skill-card" data-id="skill-4">
                    <div class="skill-icon">🎞️</div>
                    <h3>光影</h3>
                    <p>胶片 · 瞬间 · 叙事</p>
                </div>
            </div>
        </div>
    </section>

        <!-- 联系 -->
    <section class="contact section" id="contact">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <p class="contact-intro">若你读到某句话时心里泛起涟漪，那便是我们的相遇。</p>

                </a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 枝文字自留地</p>
            <p class="footer-sub">微博：枝动来动去</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
